<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toswa - Real Time Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Свайп-лента (нативная) */
        .snap-container { 
            scroll-snap-type: y mandatory; 
            overflow-y: scroll; 
            height: 100%;
            height: 100dvh; /* Для современных мобильных браузеров */
        }
        .snap-item { 
            scroll-snap-align: start; 
            scroll-snap-stop: always;
        }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-btn:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.25); }
        @media (hover: hover) { .glass-btn:hover { background: rgba(255, 255, 255, 0.2); } }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            color: white;
            padding: 16px 20px;
            transition: border-color 0.3s ease;
        }
        .glass-input:focus { outline: none; border-color: rgba(255, 255, 255, 0.5); }

        /* Анимации */
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pop-animation { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Индикатор загрузки видео */
        .video-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            z-index: 5;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden antialiased flex h-screen selection:bg-white/20">

    <aside class="hidden md:flex flex-col w-72 h-full border-r border-white/10 p-6 shrink-0 bg-black z-50">
        <h1 class="text-4xl font-black text-white mb-10 tracking-tighter italic drop-shadow-lg">TOSWA</h1>
        <nav class="flex flex-col gap-4">
            <button onclick="switchTab('home')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold bg-white/15">
                <i class="fas fa-home w-6 text-center"></i> Главная
            </button>
            <button onclick="switchTab('discover')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold opacity-60">
                <i class="fas fa-compass w-6 text-center"></i> Найти
            </button>
            <button onclick="switchTab('create')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold opacity-60">
                <i class="fas fa-plus-circle w-6 text-center"></i> Создать
            </button>
            <button onclick="switchTab('profile')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold opacity-60">
                <i class="fas fa-user-circle w-6 text-center"></i> Профиль
            </button>
        </nav>
        <div class="mt-auto" id="auth-status-pc">
            <button onclick="toggleAuthModal()" class="w-full glass-btn py-4 font-black bg-white text-black hover:bg-gray-200 shadow-xl">ВОЙТИ</button>
        </div>
    </aside>

    <main id="app" class="relative h-screen w-full flex-1 pb-[88px] md:pb-0 overflow-hidden bg-[#0a0a0a]">

        <div id="view-home" class="view h-full w-full">
            <div id="feed-container" class="snap-container h-full w-full relative">
                <div class="h-full w-full flex items-center justify-center text-white/50 text-sm">Загрузка ленты...</div>
            </div>
        </div>

        <div id="view-discover" class="view hidden h-full w-full flex-col p-4 md:p-6 overflow-y-auto pt-8 pb-24 md:pb-6">
            <div class="max-w-2xl mx-auto w-full">
                <h2 class="text-3xl font-black mb-6 tracking-tight">Поиск</h2>
                <div class="glass-input flex items-center mb-8 p-1 pl-4 gap-3">
                    <i class="fas fa-search text-white/50"></i>
                    <input type="text" id="search-input" placeholder="Искать пользователей или видео..." class="bg-transparent flex-1 outline-none text-white w-full py-2" oninput="handleSearch(this.value)">
                </div>
                <div id="search-results" class="grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-4">
                    </div>
            </div>
        </div>

        <div id="view-create" class="view hidden h-full w-full flex items-center justify-center p-6">
            <div class="glass p-10 md:p-12 rounded-[40px] w-full max-w-md text-center shadow-2xl">
                <div class="w-24 h-24 glass-btn flex items-center justify-center mx-auto mb-8 pointer-events-none">
                    <i class="fas fa-cloud-upload-alt text-4xl text-white"></i>
                </div>
                <h2 class="text-3xl font-black mb-4 tracking-tight">Опубликовать</h2>
                <p class="text-gray-300 mb-6 text-sm leading-relaxed">Ваше видео увидят все пользователи Toswa в режиме реального времени.</p>
                
                <input type="text" id="video-description" placeholder="Описание видео..." class="glass-input w-full mb-6 text-sm" maxlength="100">

                <input type="file" id="video-input" accept="video/*" class="hidden" onchange="uploadVideo(this)">
                <button onclick="document.getElementById('video-input').click()" class="glass-btn px-10 py-5 w-full font-black text-lg bg-white text-black hover:bg-gray-200">ВЫБРАТЬ ФАЙЛ</button>
                <div id="upload-progress" class="hidden mt-6 text-sm text-blue-400 font-bold bg-blue-900/20 py-2 rounded-full">Загрузка: 0%</div>
            </div>
        </div>

        <div id="view-profile" class="view hidden h-full w-full overflow-y-auto p-4 md:p-6">
            <div class="max-w-2xl mx-auto pt-8 md:pt-10 pb-24">
                <div class="glass p-8 rounded-[40px] flex flex-col items-center mb-8 relative">
                    <button onclick="openEditProfile()" class="absolute top-6 right-6 glass-btn w-10 h-10 flex items-center justify-center text-white/70 hover:text-white">
                        <i class="fas fa-cog"></i>
                    </button>

                    <img id="user-avatar" src="https://via.placeholder.com/150/333333/FFFFFF?text=USER" class="w-28 h-28 md:w-32 md:h-32 rounded-full border-4 border-white/20 object-cover shadow-2xl mb-4">
                    <h2 class="text-2xl md:text-3xl font-black tracking-tight" id="profile-username">@guest</h2>
                    <p class="text-xs text-gray-400 mt-1 mb-6" id="profile-email">Войдите в аккаунт</p>
                    
                    <button onclick="logout()" class="glass-btn px-10 py-4 text-xs font-black text-red-400 bg-red-500/10 w-full max-w-[200px]">ВЫЙТИ ИЗ СИСТЕМЫ</button>
                </div>

                <div class="flex items-center justify-center mb-6 gap-2 opacity-50">
                    <i class="fas fa-grip-horizontal"></i>
                    <span class="text-xs font-bold tracking-widest uppercase">Мои видео</span>
                </div>
                <div class="grid grid-cols-3 gap-2 md:gap-4" id="user-videos">
                    </div>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 w-full glass border-t-0 border-white/5 h-[88px] z-40 rounded-t-[35px] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="grid grid-cols-4 h-full items-center justify-items-center px-2 pb-safe">
            <button onclick="switchTab('home')" class="tab-btn active text-white p-2 flex flex-col items-center gap-1 transition-opacity">
                <i class="fas fa-home text-2xl"></i>
            </button>
            <button onclick="switchTab('discover')" class="tab-btn text-white/40 p-2 flex flex-col items-center gap-1 transition-opacity">
                <i class="fas fa-search text-2xl"></i>
            </button>
            <button onclick="switchTab('create')" class="p-2 flex justify-center items-center">
                <div class="w-14 h-14 glass-btn flex items-center justify-center bg-white text-black border-0 shadow-lg shadow-white/20">
                    <i class="fas fa-plus text-xl"></i>
                </div>
            </button>
            <button onclick="switchTab('profile')" class="tab-btn text-white/40 p-2 flex flex-col items-center gap-1 transition-opacity">
                <i class="fas fa-user text-2xl"></i>
            </button>
        </div>
    </nav>

    <div id="modal-auth" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-2xl p-4 transition-opacity">
        <div class="glass w-full max-w-sm rounded-[40px] p-8 md:p-10 relative shadow-2xl slide-up">
            <div class="absolute top-6 right-6 w-8 h-8 glass-btn flex items-center justify-center cursor-pointer" onclick="toggleAuthModal()">
                <i class="fas fa-times text-white/50"></i>
            </div>
            
            <h2 class="text-3xl font-black mb-8 text-center tracking-tight">ВХОД</h2>
            
            <form id="auth-form" onsubmit="handleAuth(event)" class="flex flex-col gap-4">
                <input type="email" id="email-input" placeholder="Ваш Email" required class="glass-input">
                <input type="password" id="pass-input" placeholder="Пароль (мин. 8 символов)" required minlength="8" class="glass-input">
                <button type="submit" class="glass-btn py-4 font-black bg-white text-black mt-2 shadow-lg">ПРОДОЛЖИТЬ</button>
            </form>
            
            <div class="flex items-center my-8 opacity-20"><hr class="w-full"> <span class="px-4 text-xs font-bold">ИЛИ</span> <hr class="w-full"></div>
            
            <button onclick="loginWithGoogle()" class="glass-btn w-full py-4 font-bold flex items-center justify-center gap-3 bg-white/5 hover:bg-white/10 text-white">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-5 h-5" alt="G">
                Продолжить с Google
            </button>
        </div>
    </div>

    <div id="modal-edit-profile" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-2xl p-4">
        <div class="glass w-full max-w-sm rounded-[40px] p-8 relative shadow-2xl slide-up">
            <div class="absolute top-6 right-6 w-8 h-8 glass-btn flex items-center justify-center cursor-pointer" onclick="closeEditProfile()">
                <i class="fas fa-times text-white/50"></i>
            </div>
            <h2 class="text-2xl font-black mb-6 text-center tracking-tight">Редактировать</h2>
            
            <form onsubmit="saveProfile(event)" class="flex flex-col gap-4">
                <div>
                    <label class="text-xs font-bold text-white/50 ml-4 mb-1 block uppercase tracking-wider">Никнейм</label>
                    <input type="text" id="edit-name" placeholder="Например: @ninja" required class="glass-input w-full">
                </div>
                <div>
                    <label class="text-xs font-bold text-white/50 ml-4 mb-1 block uppercase tracking-wider">Ссылка на фото (URL)</label>
                    <input type="url" id="edit-photo" placeholder="https://..." class="glass-input w-full">
                </div>
                <button type="submit" class="glass-btn py-4 font-black bg-white text-black mt-4">СОХРАНИТЬ</button>
            </form>
        </div>
    </div>

    <div id="modal-comments" class="hidden fixed inset-0 bg-black/50 z-[90] flex items-end justify-center backdrop-blur-md" onclick="closeComments(event)">
        <div class="glass w-full md:max-w-[420px] h-[70vh] md:h-[75vh] rounded-t-[40px] flex flex-col relative slide-up shadow-[0_-20px_50px_rgba(0,0,0,0.5)]" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20 rounded-t-[40px]">
                <span class="font-black tracking-widest text-xs opacity-60">КОММЕНТАРИИ</span>
                <div class="w-8 h-8 glass-btn flex items-center justify-center cursor-pointer" onclick="closeCommentsClick()">
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            
            <div id="comments-list" class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 scroll-smooth">
                </div>
            
            <div class="p-4 md:p-6 pb-8 border-t border-white/5 bg-black/20">
                <form onsubmit="sendComment(event)" class="flex items-center glass-input gap-3 p-1 pl-4">
                    <input type="text" id="new-comment" placeholder="Ваш комментарий..." required class="bg-transparent flex-1 outline-none text-sm text-white placeholder-white/40">
                    <button type="submit" class="w-10 h-10 glass-btn flex items-center justify-center bg-white text-black shrink-0">
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, updateDoc, increment, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd80d_HZDQWxlnD72YXShyYz6nmlNfu9U",
            authDomain: "toswa-app.firebaseapp.com",
            projectId: "toswa-app",
            storageBucket: "toswa-app.firebasestorage.app",
            messagingSenderId: "65693061626",
            appId: "1:65693061626:web:4cd561b9de732c20b8d443",
            measurementId: "G-KDKEHXLX97"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const storage = getStorage();
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;
        window.userLikes = new Set();
        window.allPosts = []; // Для поиска

        // AUTH ФУНКЦИИ
        window.toggleAuthModal = () => document.getElementById('modal-auth').classList.toggle('hidden');
        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, googleProvider); toggleAuthModal(); } catch (e) { alert(e.message); } };
        window.handleAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('pass-input').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (err) {
                if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                    try { await createUserWithEmailAndPassword(auth, email, pass); }
                    catch(e) { alert(e.message); return; }
                } else { alert(err.message); return; }
            }
            toggleAuthModal();
        };
        window.logout = () => signOut(auth).then(() => { currentUser = null; window.userLikes.clear(); switchTab('home'); });

        function updateProfileUI(user) {
            const name = user.displayName || user.email.split('@')[0];
            const photo = user.photoURL || `https://via.placeholder.com/150/333333/FFFFFF?text=${name.charAt(0).toUpperCase()}`;
            
            document.getElementById('profile-username').innerText = name;
            document.getElementById('profile-email').innerText = user.email;
            document.getElementById('user-avatar').src = photo;
            
            const pcStatus = document.getElementById('auth-status-pc');
            if(pcStatus) {
                pcStatus.innerHTML = `
                    <div class="glass p-4 rounded-3xl flex items-center gap-3">
                        <img src="${photo}" class="w-10 h-10 rounded-full object-cover shrink-0">
                        <div class="overflow-hidden">
                            <p class="text-sm font-bold truncate text-white">${name}</p>
                            <p class="text-xs text-white/50 cursor-pointer hover:text-white" onclick="logout()">Выйти</p>
                        </div>
                    </div>`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if(user) {
                currentUser = user;
                updateProfileUI(user);
                loadUserLikes();
            } else {
                currentUser = null;
                window.userLikes.clear();
                updateLikeIcons();
                
                document.getElementById('profile-username').innerText = "@guest";
                document.getElementById('profile-email').innerText = "Войдите в аккаунт";
                document.getElementById('user-avatar').src = "https://via.placeholder.com/150/333333/FFFFFF?text=USER";
                const pcStatus = document.getElementById('auth-status-pc');
                if(pcStatus) pcStatus.innerHTML = `<button onclick="toggleAuthModal()" class="w-full glass-btn py-4 font-black bg-white text-black hover:bg-gray-200 shadow-xl">ВОЙТИ</button>`;
            }
        });

        window.openEditProfile = () => {
            if(!currentUser) return toggleAuthModal();
            document.getElementById('edit-name').value = currentUser.displayName || '';
            document.getElementById('edit-photo').value = currentUser.photoURL || '';
            document.getElementById('modal-edit-profile').classList.remove('hidden');
        };
        window.closeEditProfile = () => document.getElementById('modal-edit-profile').classList.add('hidden');
        window.saveProfile = async (e) => {
            e.preventDefault();
            try {
                await updateProfile(auth.currentUser, { 
                    displayName: document.getElementById('edit-name').value, 
                    photoURL: document.getElementById('edit-photo').value 
                });
                updateProfileUI(auth.currentUser);
                closeEditProfile();
            } catch (err) { alert("Ошибка обновления: " + err.message); }
        };

        // ЗАГРУЗКА ВИДЕО
        window.uploadVideo = async (input) => {
            if(!currentUser) return toggleAuthModal();
            const file = input.files[0];
            if(!file) return;

            const descInput = document.getElementById('video-description').value || 'Новое видео!';
            const storageRef = ref(storage, `videos/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);
            
            const progressEl = document.getElementById('upload-progress');
            progressEl.classList.remove('hidden');

            uploadTask.on('state_changed', 
                (snap) => {
                    const prog = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
                    progressEl.innerText = `Загрузка: ${prog}%`;
                }, 
                (err) => alert("Ошибка загрузки: " + err.message),
                async () => {
                    const url = await getDownloadURL(uploadTask.snapshot.ref);
                    await addDoc(collection(db, "posts"), {
                        videoUrl: url,
                        userId: currentUser.uid,
                        userDisplayName: currentUser.displayName || currentUser.email.split('@')[0],
                        userPhoto: currentUser.photoURL || '',
                        createdAt: serverTimestamp(),
                        description: descInput,
                        likesCount: 0
                    });
                    progressEl.innerText = "Готово!";
                    document.getElementById('video-description').value = '';
                    setTimeout(() => { progressEl.classList.add('hidden'); switchTab('home'); }, 1000);
                }
            );
        };

        // ИНТЕРСЕКШН ОБСЕРВЕР (Автоплей видео при скролле)
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    video.play().catch(err => console.log("Autoplay blocked:", err));
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.6 }); // Срабатывает, когда видно 60% видео

        // ЗАГРУЗКА ЛЕНТЫ (Dynamic Feed)
        function loadFeed() {
            const feedContainer = document.getElementById('feed-container');
            
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
                window.allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                
                if (snap.empty) {
                    feedContainer.innerHTML = `<div class="h-full flex items-center justify-center text-white/50">Нет видео. Станьте первым!</div>`;
                    return;
                }

                // Перерисовываем ленту только если это первоначальная загрузка
                // В реальном проекте лучше добавлять/удалять узлы индивидуально
                feedContainer.innerHTML = ''; 

                snap.docs.forEach(doc => {
                    const post = doc.data();
                    const postId = doc.id;
                    const isLiked = window.userLikes.has(postId);
                    
                    const html = `
                    <div class="snap-item relative w-full h-full flex justify-center items-center" id="post-${postId}">
                        <div class="relative w-full h-full md:w-[420px] md:h-[92%] md:rounded-[40px] overflow-hidden bg-black md:shadow-[0_0_60px_rgba(0,0,0,0.6)] md:border md:border-white/10" ondblclick="handleDoubleTapLike('${postId}')">
                            
                            <div class="video-spinner"></div>
                            <video class="feed-video relative z-10 h-full w-full object-cover" loop playsinline src="${post.videoUrl}" onloadeddata="this.previousElementSibling.style.display='none'"></video>
                            
                            <div class="absolute bottom-6 md:bottom-8 left-4 md:left-6 flex flex-col gap-2 z-20 w-3/4 pointer-events-none">
                                <span class="font-bold text-lg md:text-xl drop-shadow-xl">@${post.userDisplayName}</span>
                                <p class="text-xs md:text-sm text-gray-100 drop-shadow-md leading-relaxed">${post.description || ''}</p>
                            </div>

                            <div class="absolute right-4 md:right-6 bottom-8 md:bottom-12 flex flex-col gap-4 md:gap-6 items-center z-20">
                                <div class="flex flex-col items-center cursor-pointer group" onclick="toggleLike('${postId}')">
                                    <div class="glass-btn p-3 w-12 h-12 md:w-14 md:h-14 flex items-center justify-center relative overflow-hidden">
                                        <i class="${isLiked ? 'fas text-red-500' : 'far text-white'} fa-heart text-xl md:text-2xl heart-icon drop-shadow-md transition-colors duration-300" id="like-icon-${postId}"></i>
                                    </div>
                                    <span class="text-[10px] md:text-[11px] font-bold tracking-wider" id="like-count-${postId}">${formatNum(post.likesCount || 0)}</span>
                                </div>
                                <div class="flex flex-col items-center cursor-pointer" onclick="openComments()">
                                    <div class="glass-btn p-3 w-12 h-12 md:w-14 md:h-14 flex items-center justify-center">
                                        <i class="fas fa-comment text-xl md:text-2xl drop-shadow-md"></i>
                                    </div>
                                    <span class="text-[10px] md:text-[11px] font-bold tracking-wider">0</span>
                                </div>
                                <div class="flex flex-col items-center cursor-pointer" onclick="shareVideo()">
                                    <div class="glass-btn p-3 w-12 h-12 md:w-14 md:h-14 flex items-center justify-center">
                                        <i class="fas fa-share text-xl md:text-2xl drop-shadow-md"></i>
                                    </div>
                                    <span class="text-[10px] md:text-[11px] font-bold tracking-wider">Share</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                    
                    feedContainer.insertAdjacentHTML('beforeend', html);
                });

                // Подключаем Observer ко всем новым видео
                document.querySelectorAll('.feed-video').forEach(vid => videoObserver.observe(vid));
                
                // Обновляем результаты поиска, если мы на вкладке "Найти"
                handleSearch(document.getElementById('search-input').value);
            });
        }

        // ЛАЙКИ (Запись в Базу Данных)
        window.toggleLike = async (postId) => {
            if(!currentUser) return toggleAuthModal();
            
            const likeRef = doc(db, "likes", `${currentUser.uid}_${postId}`);
            const postRef = doc(db, "posts", postId);
            
            const icon = document.getElementById(`like-icon-${postId}`);
            const countDisplay = document.getElementById(`like-count-${postId}`);
            const isLiked = icon.classList.contains('text-red-500');
            
            // Анимация
            icon.classList.remove('pop-animation');
            void icon.offsetWidth; 
            icon.classList.add('pop-animation');

            try {
                if (isLiked) {
                    // Убираем лайк (Optimistic UI)
                    icon.classList.remove('fas', 'text-red-500');
                    icon.classList.add('far', 'text-white');
                    let currentCount = parseInt(countDisplay.innerText.replace('K','000')) || 0;
                    countDisplay.innerText = formatNum(Math.max(0, currentCount - 1));
                    window.userLikes.delete(postId);
                    
                    await deleteDoc(likeRef);
                    await updateDoc(postRef, { likesCount: increment(-1) });
                } else {
                    // Ставим лайк (Optimistic UI)
                    icon.classList.remove('far', 'text-white');
                    icon.classList.add('fas', 'text-red-500');
                    let currentCount = parseInt(countDisplay.innerText.replace('K','000')) || 0;
                    countDisplay.innerText = formatNum(currentCount + 1);
                    window.userLikes.add(postId);
                    
                    await setDoc(likeRef, { userId: currentUser.uid, postId: postId, createdAt: serverTimestamp() });
                    await updateDoc(postRef, { likesCount: increment(1) });
                }
            } catch (err) {
                console.error("Ошибка лайка:", err);
            }
        };

        window.handleDoubleTapLike = (postId) => {
            const icon = document.getElementById(`like-icon-${postId}`);
            if (icon && !icon.classList.contains('text-red-500')) {
                toggleLike(postId);
            }
        };

        // Подгрузка лайков текущего юзера
        function loadUserLikes() {
            if(!currentUser) return;
            const q = query(collection(db, "likes"), where("userId", "==", currentUser.uid));
            onSnapshot(q, (snap) => {
                window.userLikes.clear();
                snap.docs.forEach(d => window.userLikes.add(d.data().postId));
                updateLikeIcons();
            });
        }

        function updateLikeIcons() {
            document.querySelectorAll('.heart-icon').forEach(icon => {
                const postId = icon.id.replace('like-icon-', '');
                if(window.userLikes.has(postId)) {
                    icon.classList.remove('far', 'text-white');
                    icon.classList.add('fas', 'text-red-500');
                } else {
                    icon.classList.remove('fas', 'text-red-500');
                    icon.classList.add('far', 'text-white');
                }
            });
        }

        // ПОИСК (Discover Tab)
        window.handleSearch = (queryText) => {
            const resultsContainer = document.getElementById('search-results');
            if(!queryText || !queryText.trim()) {
                // Если пусто - показываем все видео
                renderSearchResults(window.allPosts);
                return;
            }
            
            const lowerQ = queryText.toLowerCase();
            const filtered = window.allPosts.filter(p => 
                (p.userDisplayName && p.userDisplayName.toLowerCase().includes(lowerQ)) || 
                (p.description && p.description.toLowerCase().includes(lowerQ))
            );
            
            renderSearchResults(filtered);
        };

        function renderSearchResults(posts) {
            const resultsContainer = document.getElementById('search-results');
            if(posts.length === 0) {
                resultsContainer.innerHTML = '<p class="text-white/50 text-center col-span-full mt-10">Ничего не найдено</p>';
                return;
            }
            
            resultsContainer.innerHTML = posts.map(post => `
                <div class="aspect-[9/16] glass rounded-2xl overflow-hidden relative cursor-pointer group" onclick="switchTab('home'); /* здесь можно добавить скролл к конкретному посту */">
                    <video class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" src="${post.videoUrl}#t=0.1" preload="metadata"></video>
                    <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/80 to-transparent p-2 pt-6">
                        <div class="text-[10px] font-bold truncate drop-shadow-md">@${post.userDisplayName}</div>
                    </div>
                </div>
            `).join('');
        }

        // КОММЕНТАРИИ (оставил как было)
        window.sendComment = async (e) => {
            e.preventDefault();
            const text = document.getElementById('new-comment').value;
            if(!text || !currentUser) { if(!currentUser) toggleAuthModal(); return; }
            
            const name = currentUser.displayName || currentUser.email.split('@')[0];
            const photo = currentUser.photoURL || `https://via.placeholder.com/150/333333/FFFFFF?text=${name.charAt(0).toUpperCase()}`;

            await addDoc(collection(db, "comments"), { text, userName: name, userPhoto: photo, time: serverTimestamp() });
            document.getElementById('new-comment').value = '';
        };

        onSnapshot(query(collection(db, "comments"), orderBy("time", "desc")), (snap) => {
            const list = document.getElementById('comments-list');
            list.innerHTML = snap.docs.map(doc => {
                const data = doc.data();
                return `
                <div class="flex gap-4 slide-up">
                    <img src="${data.userPhoto || 'https://via.placeholder.com/150/333333/FFFFFF?text=U'}" class="w-10 h-10 rounded-full border border-white/10 object-cover shrink-0">
                    <div>
                        <span class="text-[11px] font-black opacity-50 tracking-wider">${data.userName}</span>
                        <p class="text-sm mt-1 text-white/90 leading-snug">${data.text}</p>
                    </div>
                </div>`;
            }).join('');
        });

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            loadFeed();
        });

    </script>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            
            // Обновляем мобильный бар
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('opacity-40'));
            const activeMobileBtn = document.querySelector(`.tab-btn[onclick="switchTab('${id}')"]`);
            if(activeMobileBtn) activeMobileBtn.classList.remove('opacity-40');

            // Обновляем ПК сайдбар
            document.querySelectorAll('.nav-btn-pc').forEach(b => {
                b.classList.add('opacity-60'); b.classList.remove('bg-white/15');
            });
            const activePcBtn = document.querySelector(`.nav-btn-pc[onclick="switchTab('${id}')"]`);
            if(activePcBtn) {
                activePcBtn.classList.remove('opacity-60');
                activePcBtn.classList.add('bg-white/15');
            }

            // Управление видео (ставим на паузу, если ушли с главной)
            const videos = document.querySelectorAll('.feed-video');
            if (id !== 'home') {
                videos.forEach(v => v.pause());
            } else {
                // Включаем только то видео, которое видно на экране
                videos.forEach(v => {
                    const rect = v.getBoundingClientRect();
                    if(rect.top >= 0 && rect.bottom <= (window.innerHeight || document.documentElement.clientHeight)) {
                        v.play().catch(()=>{});
                    }
                });
            }
            
            // Если открыли поиск - отображаем результаты сразу
            if(id === 'discover') {
                handleSearch(document.getElementById('search-input').value);
            }
        }

        async function shareVideo() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Toswa Video',
                        text: 'Зацени это видео на Toswa!',
                        url: window.location.href
                    });
                } catch (err) { console.log('Ошибка шаринга:', err); }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Ссылка скопирована в буфер обмена!');
            }
        }

        function formatNum(num) {
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        function openComments() { document.getElementById('modal-comments').classList.remove('hidden'); }
        function closeCommentsClick() { document.getElementById('modal-comments').classList.add('hidden'); }
        function closeComments(e) { if(e.target.id === 'modal-comments') closeCommentsClick(); }
    </script>
</body>
</html>
