<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toswa - Real Time Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .snap-container { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100vh; }
        .snap-item { scroll-snap-align: start; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Glassmorphism & iPhone Style */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.25); }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
            padding: 14px 20px;
        }

        /* Анимация появления */
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden antialiased flex h-screen">

    <aside class="hidden md:flex flex-col w-72 h-full border-r border-white/10 p-6 shrink-0 bg-black z-50">
        <h1 class="text-4xl font-black text-white mb-10 tracking-tighter italic">TOSWA</h1>
        <nav class="flex flex-col gap-4">
            <button onclick="switchTab('home')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold bg-white/10">
                <i class="fas fa-home w-6"></i> Главная
            </button>
            <button onclick="switchTab('discover')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold opacity-60">
                <i class="fas fa-compass w-6"></i> Найти
            </button>
            <button onclick="switchTab('create')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold opacity-60">
                <i class="fas fa-plus-circle w-6"></i> Создать
            </button>
            <button onclick="switchTab('profile')" class="nav-btn-pc flex items-center gap-4 text-lg p-4 glass-btn w-full text-left font-bold opacity-60">
                <i class="fas fa-user-circle w-6"></i> Профиль
            </button>
        </nav>
        <div class="mt-auto" id="auth-status-pc">
            <button onclick="toggleAuthModal()" class="w-full glass-btn py-4 font-black bg-red-600/80 hover:bg-red-500 shadow-lg shadow-red-900/20">ВОЙТИ</button>
        </div>
    </aside>

    <main id="app" class="relative h-screen w-full flex-1 pb-16 md:pb-0 overflow-hidden bg-[#050505]">

        <div id="view-home" class="view snap-container h-full w-full">
            <div class="snap-item relative w-full h-full flex justify-center items-center">
                <div class="relative w-full h-full md:w-[420px] md:h-[92%] md:rounded-[40px] overflow-hidden bg-gray-900 md:shadow-[0_0_50px_rgba(0,0,0,0.5)] md:border md:border-white/10">
                    <video class="feed-video h-full w-full object-cover" loop playsinline>
                        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    </video>
                    
                    <div class="absolute bottom-8 left-6 flex flex-col gap-2 z-10 w-2/3">
                        <span class="font-bold text-xl drop-shadow-xl">@toswa_cloud</span>
                        <p class="text-sm text-gray-200 drop-shadow-md">Мы теперь в облаке! Стеклянный интерфейс готов к работе 🥂</p>
                    </div>

                    <div class="absolute right-6 bottom-12 flex flex-col gap-6 items-center z-10">
                        <div class="flex flex-col items-center cursor-pointer" onclick="handleLike(this, 1200)">
                            <div class="glass-btn p-4 mb-1"><i class="fas fa-heart text-2xl heart-icon"></i></div>
                            <span class="text-xs font-bold like-count">1.2K</span>
                        </div>
                        <div class="flex flex-col items-center cursor-pointer" onclick="openComments()">
                            <div class="glass-btn p-4 mb-1"><i class="fas fa-comment text-2xl"></i></div>
                            <span class="text-xs font-bold">45</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-create" class="view hidden h-full w-full flex items-center justify-center p-6">
            <div class="glass p-12 rounded-[40px] w-full max-w-md text-center">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-cloud-upload-alt text-4xl text-white/40"></i>
                </div>
                <h2 class="text-3xl font-bold mb-3">Опубликовать</h2>
                <p class="text-gray-400 mb-10 text-sm">Ваше видео увидят все пользователи Toswa в режиме реального времени.</p>
                
                <input type="file" id="video-input" accept="video/*" class="hidden" onchange="uploadVideo(this)">
                <button onclick="document.getElementById('video-input').click()" class="glass-btn px-10 py-5 w-full font-black text-lg bg-white text-black">ВЫБРАТЬ ФАЙЛ</button>
                <div id="upload-progress" class="hidden mt-6 text-sm text-blue-400 font-bold">Загрузка: 0%</div>
            </div>
        </div>

        <div id="view-profile" class="view hidden h-full w-full overflow-y-auto p-6">
            <div class="max-w-2xl mx-auto pt-10">
                <div class="glass p-8 rounded-[40px] flex flex-col items-center gap-6 mb-8 text-center">
                    <img id="user-avatar" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-full border-4 border-white/10 object-cover">
                    <div>
                        <h2 class="text-3xl font-black" id="profile-username">@guest</h2>
                        <div class="flex gap-8 mt-4 text-sm font-bold text-gray-400 uppercase tracking-widest">
                            <div><span class="text-white block text-xl">0</span> видео</div>
                            <div><span class="text-white block text-xl">0</span> фанатов</div>
                        </div>
                    </div>
                    <button onclick="logout()" class="glass-btn px-8 py-3 text-xs font-bold border-red-500/30 text-red-400">ВЫЙТИ ИЗ СИСТЕМЫ</button>
                </div>
                <div class="grid grid-cols-3 gap-3" id="user-videos">
                    <div class="aspect-[9/16] glass rounded-3xl flex items-center justify-center text-white/10"><i class="fas fa-film text-3xl"></i></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 w-full glass border-t-0 flex justify-around items-center h-20 z-40 px-6 rounded-t-[35px]">
        <button onclick="switchTab('home')" class="tab-btn text-white p-3"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="switchTab('discover')" class="tab-btn text-white/40 p-3"><i class="fas fa-search text-2xl"></i></button>
        <button onclick="switchTab('create')" class="p-3"><div class="w-12 h-12 glass-btn flex items-center justify-center bg-white text-black border-0"><i class="fas fa-plus"></i></div></button>
        <button onclick="switchTab('profile')" class="tab-btn text-white/40 p-3"><i class="fas fa-user text-2xl"></i></button>
    </nav>

    <div id="modal-auth" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-xl p-4">
        <div class="glass w-full max-w-sm rounded-[45px] p-10 relative shadow-2xl">
            <i class="fas fa-times absolute top-8 right-8 cursor-pointer opacity-40" onclick="toggleAuthModal()"></i>
            <h2 class="text-3xl font-black mb-8 text-center tracking-tight">ВХОД</h2>
            
            <form id="auth-form" onsubmit="handleAuth(event)" class="flex flex-col gap-4">
                <input type="email" id="email-input" placeholder="Email" required class="glass-input">
                <input type="password" id="pass-input" placeholder="Пароль (мин. 8 знаков)" required minlength="8" class="glass-input">
                <button type="submit" class="glass-btn py-5 font-black bg-white text-black mt-4">ПРОДОЛЖИТЬ</button>
            </form>
            
            <div class="flex items-center my-8 opacity-20"><hr class="w-full"> <span class="px-4 text-xs font-bold">ИЛИ</span> <hr class="w-full"></div>
            
            <button onclick="loginWithGoogle()" class="glass-btn w-full py-5 font-bold flex items-center justify-center gap-3 bg-red-600/10 border-red-500/20 text-red-500">
                <i class="fab fa-google"></i> Google Account
            </button>
        </div>
    </div>

    <div id="modal-comments" class="hidden fixed inset-0 bg-black/40 z-[90] flex items-end justify-center backdrop-blur-sm" onclick="closeComments(event)">
        <div class="glass w-full md:max-w-[420px] h-[75vh] rounded-t-[45px] flex flex-col relative slide-up" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span class="font-black tracking-widest text-xs opacity-50">КОММЕНТАРИИ</span>
                <i class="fas fa-chevron-down cursor-pointer" onclick="closeCommentsClick()"></i>
            </div>
            <div id="comments-list" class="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
                </div>
            <div class="p-6 pb-10">
                <div class="flex items-center glass-input gap-4">
                    <input type="text" id="new-comment" placeholder="Написать..." class="bg-transparent flex-1 outline-none text-sm">
                    <button onclick="sendComment()" class="text-blue-400 font-black text-xs uppercase">Ok</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        // Твой конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDd80d_HZDQWxlnD72YXShyYz6nmlNfu9U",
            authDomain: "toswa-app.firebaseapp.com",
            projectId: "toswa-app",
            storageBucket: "toswa-app.firebasestorage.app",
            messagingSenderId: "65693061626",
            appId: "1:65693061626:web:4cd561b9de732c20b8d443",
            measurementId: "G-KDKEHXLX97"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app); // Добавлена аналитика из твоего кода
        const auth = getAuth();
        const db = getFirestore();
        const storage = getStorage();
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;

        // Глобальные функции для кнопок
        window.toggleAuthModal = () => document.getElementById('modal-auth').classList.toggle('hidden');
        
        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, googleProvider);
                toggleAuthModal();
            } catch (e) { alert(e.message); }
        };

        window.handleAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('pass-input').value;
            try {
                // Пытаемся войти, если нет - создаем
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                if(err.code === 'auth/user-not-found') {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } else { alert(err.message); }
            }
            toggleAuthModal();
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        window.uploadVideo = async (input) => {
            if(!currentUser) return toggleAuthModal();
            const file = input.files[0];
            if(!file) return;

            const storageRef = ref(storage, `videos/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);
            
            const progressEl = document.getElementById('upload-progress');
            progressEl.classList.remove('hidden');

            uploadTask.on('state_changed', 
                (snap) => {
                    const prog = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
                    progressEl.innerText = `Загрузка: ${prog}%`;
                }, 
                (err) => alert(err.message),
                async () => {
                    const url = await getDownloadURL(uploadTask.snapshot.ref);
                    await addDoc(collection(db, "posts"), {
                        videoUrl: url,
                        user: currentUser.email,
                        createdAt: serverTimestamp()
                    });
                    progressEl.innerText = "Готово!";
                    setTimeout(() => switchTab('home'), 1000);
                }
            );
        };

        // Слежение за пользователем
        onAuthStateChanged(auth, (user) => {
            if(user) {
                currentUser = user;
                document.getElementById('profile-username').innerText = user.displayName || user.email.split('@')[0];
                if(user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('auth-status-pc').innerHTML = `<div class="p-4 glass rounded-3xl text-center text-xs font-bold">${user.email}</div>`;
            }
        });

        // Real-time комменты
        window.sendComment = async () => {
            const text = document.getElementById('new-comment').value;
            if(!text || !currentUser) return;
            await addDoc(collection(db, "comments"), {
                text, user: currentUser.email, time: serverTimestamp()
            });
            document.getElementById('new-comment').value = '';
        };

        onSnapshot(query(collection(db, "comments"), orderBy("time", "desc")), (snap) => {
            const list = document.getElementById('comments-list');
            list.innerHTML = snap.docs.map(doc => `
                <div class="flex gap-4 slide-up">
                    <div class="w-10 h-10 rounded-full glass shrink-0 flex items-center justify-center font-bold text-[10px]">USER</div>
                    <div>
                        <span class="text-[10px] font-black opacity-30 uppercase">${doc.data().user}</span>
                        <p class="text-sm mt-1">${doc.data().text}</p>
                    </div>
                </div>
            `).join('');
        });
    </script>

    <script>
        // Навигация (чистый JS)
        function switchTab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('opacity-40'));
            const activeMobileBtn = document.querySelector(`.tab-btn[onclick="switchTab('${id}')"]`);
            if(activeMobileBtn) activeMobileBtn.classList.remove('opacity-40');

            document.querySelectorAll('.nav-btn-pc').forEach(b => b.classList.add('opacity-60'));
            const activePcBtn = document.querySelector(`.nav-btn-pc[onclick="switchTab('${id}')"]`);
            if(activePcBtn) {
                activePcBtn.classList.remove('opacity-60');
                activePcBtn.classList.add('bg-white/10');
            } else {
                document.querySelectorAll('.nav-btn-pc').forEach(b => b.classList.remove('bg-white/10'));
            }

            // Логика видео (пауза вне главной)
            const videos = document.querySelectorAll('.feed-video');
            if (id !== 'home') {
                videos.forEach(v => v.pause());
            } else {
                videos.forEach(v => v.play().catch(()=>{}));
            }
        }

        function handleLike(el, count) {
            const icon = el.querySelector('.heart-icon');
            icon.classList.toggle('text-red-500');
            icon.classList.toggle('fas'); 
        }

        function openComments() { document.getElementById('modal-comments').classList.remove('hidden'); }
        function closeCommentsClick() { document.getElementById('modal-comments').classList.add('hidden'); }
        function closeComments(e) { if(e.target.id === 'modal-comments') closeCommentsClick(); }
    </script>
</body>
</html>
